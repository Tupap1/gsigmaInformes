name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.5
        env:
          MYSQL_ROOT_PASSWORD: devrootpassword
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Initialize Database with Seed Script
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -pdevrootpassword < db-init/seed.sql

      - name: Run Tests
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_READ_USER: reci_read
          DB_READ_PASSWORD: read_pass_123
          DB_WRITE_USER: reci_write
          DB_WRITE_PASSWORD: write_pass_123
        run: npm test
